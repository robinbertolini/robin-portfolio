<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="keywords" content="drone, droni, fotografia aerea, video, FPV, riprese, Instagram reel, autoplay">
    <meta name="description" content="Pagina dedicata al mondo dei droni: carosello di foto e griglia di reel Instagram di Robin Bertolini.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin Bertolini · Drone</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter & Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* ===== NAVBAR (identica, ma colore drone azzurro) ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2.5rem;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px -10px rgba(0,0,0,0.05);
        }

        .logo a {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(145deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            font-weight: 500;
            position: relative;
            padding: 0.3rem 0;
            transition: color 0.2s;
            text-decoration: none;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2.5px;
            background: currentColor;
            transition: width 0.25s ease;
            border-radius: 4px;
            opacity: 0.7;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a.active {
            font-weight: 600;
        }

        /* Colori voci menu (drone in azzurro chiaro) */
        .nav-links a[href="index.html"] { color: #1e293b; }
        .nav-links a[href="cv.html"] { color: #1e4a4a; }
        .nav-links a[href="progetti.html"] { color: #b45309; }
        .nav-links a[href="drone.html"] { color: #60a5fa; } /* light blue */
        .nav-links a[href="contatti.html"] { 
            color: #ffffff; 
            background: #0f172a; 
            padding: 0.4rem 1.2rem; 
            border-radius: 40px; 
            margin-top: -0.2rem;
        }
        .nav-links a[href="contatti.html"]::after {
            display: none;
        }
        .nav-links a[href="contatti.html"]:hover {
            background: #1e293b;
            transform: scale(1.02);
        }

        /* Selettore lingua */
        .lang-switch {
            display: flex;
            gap: 0.5rem;
            margin-left: 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            border-left: 1px solid #cbd5e1;
            padding-left: 1.5rem;
        }
        .lang-switch a {
            color: #64748b;
            text-decoration: none;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .lang-switch a.active-lang {
            background: #1e293b;
            color: white;
        }
        .lang-switch a:not(.active-lang):hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        /* ===== MAIN CONTENT DRONE ===== */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .page-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: #60a5fa; /* light blue */
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* ----- CAROSELLO FOTO GRANDE ----- */
        .carousel-section {
            margin-bottom: 4rem;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 40px -18px #60a5fa;
            border: 1px solid #60a5fa30;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-slide {
            flex: 0 0 100%;
            height: 100%;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1e293b;
            transition: all 0.2s;
            z-index: 10;
            border: 1px solid white;
        }

        .carousel-btn:hover {
            background: white;
            color: #60a5fa;
            transform: translateY(-50%) scale(1.1);
        }

        .carousel-prev {
            left: 20px;
        }

        .carousel-next {
            right: 20px;
        }

        .carousel-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.8rem;
            z-index: 10;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .dot.active {
            background: #60a5fa;
            transform: scale(1.3);
            border-color: white;
        }

        /* ----- GRIGLIA REEL INSTAGRAM 3x3 ----- */
        .reels-section {
            margin-top: 3rem;
        }

        .section-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .section-subtitle i {
            color: #60a5fa;
            font-size: 2rem;
        }

        .reels-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .reel-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 25px -12px rgba(96, 165, 250, 0.3);
            border: 1px solid #60a5fa20;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 9 / 16; /* formato reel verticale */
            position: relative;
        }

        .reel-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 30px -10px #60a5fa;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            pointer-events: none;
        }

        .reel-overlay i {
            font-size: 1.3rem;
            color: #60a5fa;
            filter: drop-shadow(0 2px 4px black);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2.5rem 2rem;
            color: #64748b;
            font-size: 0.95rem;
            border-top: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
        }

        /* Scroll fade */
        .scroll-fade {
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.3, 1), transform 0.7s cubic-bezier(0.2, 0.9, 0.3, 1);
        }
        .scroll-fade.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .reels-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .navbar { flex-direction: column; gap: 1rem; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 1rem; }
            .lang-switch { border-left: none; padding-left: 0; margin-left: 0; }
            .carousel-container { height: 300px; }
            .reels-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html">RB</a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cv.html">CV</a>
            <a href="progetti.html">Progetti</a>
            <a href="drone.html" class="active">Drone</a>
            <a href="contatti.html">Contatti</a>
            <div class="lang-switch">
                <a class="active-lang">IT</a>
                <a>EN</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title scroll-fade"><i class="fa-regular fa-compass"></i> Drone · Aerial World</h1>

        <!-- CAROSELLO FOTO GRANDE -->
        <section class="carousel-section scroll-fade">
            <div class="carousel-container" id="carousel">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Slides inserite via JS -->
                </div>
                <button class="carousel-btn carousel-prev" id="prevBtn">‹</button>
                <button class="carousel-btn carousel-next" id="nextBtn">›</button>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </section>

        <!-- GRIGLIA REEL INSTAGRAM 3x3 (AUTOPLAY) -->
        <section class="reels-section scroll-fade">
            <h2 class="section-subtitle"><i class="fa-brands fa-instagram"></i> Reel recenti</h2>
            <div class="reels-grid" id="reelsGrid">
                <!-- Generati via JS 9 reel -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2025 Robin Bertolini · ingegneria delle comunicazioni e elettronica · droni e visione artificiale</p>
    </footer>

    <script>
        (function() {
            // ---------- CAROSELLO ----------
            const images = [
                "DJI_0523.JPG", 
                "DJI_0226.JPG", 
                "DJI_0969.JPG", 
                "DJI_0803.JPG", 
                "DJI_0503.JPG",
                "DJI_0412.JPG"
            ];

            const track = document.getElementById('carouselTrack');
            const dotsContainer = document.getElementById('carouselDots');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            let currentIndex = 0;

            function renderCarousel() {
                // Slides
                track.innerHTML = images.map((src, i) => `
                    <div class="carousel-slide">
                        <img src="${src}" alt="Drone shot ${i+1}" loading="lazy">
                    </div>
                `).join('');

                // Dots
                dotsContainer.innerHTML = images.map((_, i) => `
                    <div class="dot ${i === currentIndex ? 'active' : ''}" data-index="${i}"></div>
                `).join('');

                updateSlide();
            }

            function updateSlide() {
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                document.querySelectorAll('.dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentIndex);
                });
            }

            function nextSlide() {
                currentIndex = (currentIndex + 1) % images.length;
                updateSlide();
            }

            function prevSlide() {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                updateSlide();
            }

            // Event listeners
            prevBtn.addEventListener('click', prevSlide);
            nextBtn.addEventListener('click', nextSlide);
            dotsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('dot')) {
                    const index = parseInt(e.target.dataset.index);
                    if (!isNaN(index)) {
                        currentIndex = index;
                        updateSlide();
                    }
                }
            });

            // Autoplay carosello (ogni 5 secondi)
            let autoplay = setInterval(nextSlide, 5000);
            const carousel = document.getElementById('carousel');
            carousel.addEventListener('mouseenter', () => clearInterval(autoplay));
            carousel.addEventListener('mouseleave', () => {
                autoplay = setInterval(nextSlide, 5000);
            });

            renderCarousel();

            // ---------- REEL INSTAGRAM (3x3) ----------
            const reelsGrid = document.getElementById('reelsGrid');
            // Usiamo lo stesso video campione (fiore) per tutti, ma potresti sostituire con URL reali
            const reelVideoSrc = "https://www.instagram.com/rob_ber345/";
            // Creiamo 9 reel
            const reelCount = 9;
            for (let i = 0; i < reelCount; i++) {
                const card = document.createElement('div');
                card.className = 'reel-card';
                card.innerHTML = `
                    <video class="reel-video" autoplay loop muted playsinline>
                        <source src="${reelVideoSrc}" type="video/mp4">
                    </video>
                    <div class="reel-overlay">
                        <i class="fa-brands fa-instagram"></i> @robin_bertolini
                    </div>
                `;
                reelsGrid.appendChild(card);
            }

            // ---------- SELEZIONE LINGUA (demo) ----------
            const langIt = document.querySelector('.lang-switch a:first-child');
            const langEn = document.querySelector('.lang-switch a:last-child');
            langIt.addEventListener('click', (e) => {
                e.preventDefault();
                langIt.classList.add('active-lang');
                langEn.classList.remove('active-lang');
            });
            langEn.addEventListener('click', (e) => {
                e.preventDefault();
                langEn.classList.add('active-lang');
                langIt.classList.remove('active-lang');
            });

            // ---------- SCROLL REVEAL ----------
            const fadeElements = document.querySelectorAll('.scroll-fade');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.2, rootMargin: '0px 0px -20px 0px' });

            fadeElements.forEach(el => {
                observer.observe(el);
                // Controllo immediato per elementi già visibili
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.8) {
                    el.classList.add('visible');
                    observer.unobserve(el);
                }
            });

            // Imposta active link su Drone (già presente con classe active, ma per sicurezza)
            const currentPage = window.location.pathname.split('/').pop() || 'drone.html';
            document.querySelectorAll('.nav-links a:not(.lang-switch a)').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === currentPage) link.classList.add('active');
            });
        })();
    </script>
</body>
</html>
